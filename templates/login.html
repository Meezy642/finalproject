{% extends "base.html" %}

{% block title %}YSTAA Shop | Core Login{% endblock %}

{% block content %}
<div class="form-container glass-panel animate-fade-in">
    <div class="form-header">
        <h2>Sign In</h2>
        <p>to continue to YSTAA shop</p>
    </div>
    
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="username_or_email" class="form-label">Username or Email</label>
            <input type="text" id="username_or_email" name="username_or_email" class="form-input" required placeholder="Enter login details">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" required placeholder="Enter password">
        </div>
        
        <div class="form-footer">
            <a href="{{ url_for('reset_password') }}">Forgot Password?</a>
            <a href="{{ url_for('register') }}">Sign Up</a>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 10px; margin-top: 24px; padding: 12px;">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
