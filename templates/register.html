{% extends "base.html" %}

{% block title %}YSTAA Shop | Register Account{% endblock %}

{% block content %}
<div class="form-container glass-panel animate-fade-in">
    <div class="form-header">
        <h2>Register Account</h2>
        <p>Or already registered? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
    
    <form action="{{ url_for('register') }}" method="POST" onsubmit="return validateRegisterForm()">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-input" required placeholder="e.g., cyber_architect">
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" required placeholder="e.g., neo@matrix.io">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" required placeholder="Minimum 6 characters">
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" id="confirm_password" class="form-input" required placeholder="Verify credentials">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 10px; margin-top: 16px; padding: 12px;">
            Sign Up
        </button>
    </form>
</div>

<script>
    function validateRegisterForm() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if (password.length < 6) {
            showToast("Password must be at least 6 characters long.", "error");
            return false;
        }
        
        if (password !== confirm) {
            showToast("Passwords do not match. Please verify.", "error");
            return false;
        }
        return true;
    }
</script>
{% endblock %}
