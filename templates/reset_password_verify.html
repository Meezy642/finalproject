{% extends "base.html" %}

{% block title %}YSTAA Shop | Verify Recovery Code{% endblock %}

{% block content %}
<div class="form-container glass-panel animate-fade-in" style="max-width: 450px; margin: 60px auto; padding: 40px; border-radius: 20px;">
    <div class="form-header" style="text-align: center; margin-bottom: 30px;">
        <h2 style="font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary);">Verify Reset Code</h2>
        <p style="font-size: 14px; color: var(--text-secondary);">Enter the 6-digit code sent to your email to establish a new password.</p>
    </div>
    
    <form action="{{ url_for('reset_password_verify') }}" method="POST" onsubmit="return validateVerifyForm()">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label class="form-label" style="display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-muted);">Email Address</label>
            <input type="text" class="form-input" value="{{ email }}" disabled style="opacity: 0.7; cursor: not-allowed; width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-primary);">
        </div>
        
        <div class="form-group" style="margin-bottom: 24px;">
            <label for="code" class="form-label" style="display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-muted);">6-Digit Verification Code</label>
            <input type="text" id="code" name="code" class="form-input" required placeholder="e.g., 123456" maxlength="6" pattern="\d{6}" style="text-align: center; font-size: 24px; letter-spacing: 6px; font-weight: 700; font-family: monospace; width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-primary);">
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="new_password" class="form-label" style="display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-muted);">New Password</label>
            <input type="password" id="new_password" name="new_password" class="form-input" required placeholder="Minimum 6 characters" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-primary);">
        </div>
        
        <div class="form-group" style="margin-bottom: 24px;">
            <label for="confirm_password" class="form-label" style="display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-muted);">Confirm New Password</label>
            <input type="password" id="confirm_password" class="form-input" required placeholder="Verify new password" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-primary);">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600;">
            Update Credentials
        </button>
    </form>
    
    <div class="form-footer" style="justify-content: center; margin-top: 24px; text-align: center;">
        <a href="{{ url_for('reset_password') }}" style="color: var(--accent-cyan); font-size: 13px; text-decoration: none;">Request New Code</a>
    </div>
</div>

<script>
    function validateVerifyForm() {
        const code = document.getElementById('code').value;
        const password = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if (code.length !== 6 || isNaN(code)) {
            showToast("Verification code must be exactly 6 digits.", "error");
            return false;
        }
        
        if (password.length < 6) {
            showToast("Password must be at least 6 characters long.", "error");
            return false;
        }
        
        if (password !== confirm) {
            showToast("Passwords do not match. Please verify.", "error");
            return false;
        }
        return true;
    }
</script>
{% endblock %}
